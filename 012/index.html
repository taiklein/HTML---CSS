<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos With HTML5</title>
</head>
<body>
    <h1>Adding Videos hosted locally</h1>
    <p>This video is hosted on my own server</p>
    <video controls autoplay loop> 
<source src="media/my_video.mp4" type="video/mp4">
<source src="media/my_video.webm.webm" type="video/webm">
    </video>
    <p>Your browse is not compatible to play this video</p>
    <h1>Adding Videos from YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/rx8EhkXk9zs?si=hzHPJFwCgRJ1F8YH" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
